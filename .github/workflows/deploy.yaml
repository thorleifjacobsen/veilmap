name: Deploy to Production

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'tailwind.config.ts'
      - 'postcss.config.js'
      - 'prisma.config.ts'
      - 'instrumentation.ts'
      - 'middleware.ts'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            # Trap to serialize builds
            while [ -f /tmp/preview-build.lock ]; do sleep 5; done
            touch /tmp/preview-build.lock
            trap "rm -f /tmp/preview-build.lock" EXIT

            cd /home/veilmap/app
            git fetch --all
            git checkout ${{ github.event.inputs.branch || 'main' }}
            git pull origin ${{ github.event.inputs.branch || 'main' }}
            npm ci
            npx prisma migrate deploy
            npm run build
            pm2 restart veilmap
            pm2 save
