name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'src/**'
      - 'prisma/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.js'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'tailwind.config.ts'
      - 'postcss.config.js'
      - 'prisma.config.ts'
      - 'instrumentation.ts'
      - 'middleware.ts'
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to deploy'
        required: true
      branch:
        description: 'Branch name'
        required: true

permissions:
  pull-requests: write
  issues: write

concurrency:
  group: preview-pr-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true


jobs:
  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Deploy Preview
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            # Trap to serialize builds
            while [ -f /tmp/preview-build.lock ]; do sleep 5; done
            touch /tmp/preview-build.lock
            trap "rm -f /tmp/preview-build.lock" EXIT

            PR=${{ github.event.pull_request.number || github.event.inputs.pr_number }}
            BRANCH=${{ github.head_ref || github.event.inputs.branch }}
            PORT=$((3000 + $PR))
            DIR=/home/veilmap/previews/pr-$PR

            # Clone or force-update
            if [ -d "$DIR" ]; then
              cd $DIR
              git fetch --all
              git reset --hard origin/$BRANCH
              git checkout $BRANCH
              git pull --force origin $BRANCH
            else
              git clone git@github.com:thorleifjacobsen/veilmap.git $DIR
              cd $DIR
              git checkout $BRANCH
            fi

            # Copy .env and set port and base URL
            cp /home/veilmap/app/.env $DIR/.env
            sed -i "s/^PORT=.*/PORT=$PORT/" $DIR/.env
            grep -q "^PORT=" $DIR/.env || echo "PORT=$PORT" >> $DIR/.env
            sed -i "s|^NEXT_PUBLIC_BASE_URL=.*|NEXT_PUBLIC_BASE_URL=https://pr-$PR.veilmap.app|" $DIR/.env
            # sed -i 's|\(DATABASE_URL=.*/\)veilmap\(["'"'"']\?\)$|\1veilmap_dev\2|' $DIR/.env

            grep -q "^EMAIL_OVERRIDE_TO=" $DIR/.env && \
              sed -i "s/^EMAIL_OVERRIDE_TO=.*/EMAIL_OVERRIDE_TO=override@veilmap.app/" $DIR/.env || \
              echo "EMAIL_OVERRIDE_TO=override@veilmap.app" >> $DIR/.env

            # Patch ecosystem.config.js with correct name and port
            sed -i "s/name: 'veilmap'/name: 'veilmap-pr-$PR'/" $DIR/ecosystem.config.js
            sed -i "s|cwd: '/home/veilmap/app'|cwd: '$DIR'|" $DIR/ecosystem.config.js
            sed -i "s/PORT: 3000/PORT: $PORT/" $DIR/ecosystem.config.js

            # Install and build
            cd $DIR
            npm ci
            npx prisma migrate deploy
            npm run build

            # Start or restart PM2
            if pm2 show veilmap-pr-$PR > /dev/null 2>&1; then
              pm2 restart veilmap-pr-$PR
            else
              pm2 start $DIR/ecosystem.config.js
            fi

            # Caddy config
            sudo tee /etc/caddy/previews/pr-$PR.conf > /dev/null <<EOF
            pr-$PR.veilmap.app {
              reverse_proxy localhost:$PORT
              tls internal
            }
            EOF
            sudo caddy reload --config /etc/caddy/Caddyfile

      - name: Post Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Preview deployed to https://pr-${{ github.event.pull_request.number }}.veilmap.app'
            })

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Remove Preview
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"

            PR=${{ github.event.pull_request.number }}

            pm2 delete veilmap-pr-$PR || true

            rm -rf /home/veilmap/previews/pr-$PR

            sudo rm -f /etc/caddy/previews/pr-$PR.conf
            sudo caddy reload --config /etc/caddy/Caddyfile

      - name: Post Cleanup Comment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🗑️ Preview for PR #${{ github.event.pull_request.number }} has been removed.'
            })
